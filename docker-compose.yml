version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: eventpilot-db
    restart: always
    environment:
      POSTGRES_USER: eventpilot_user
      POSTGRES_PASSWORD: eventpilot_secure_password
      POSTGRES_DB: eventpilot_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: eventpilot-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://eventpilot_user:eventpilot_secure_password@db:5432/eventpilot_db
      - SECRET_KEY=eventpilot_super_secret_key_change_me_in_production
    depends_on:
      - db
    volumes:
      - ./backend/static:/workspace/static

  frontend:
    build: ./frontend
    container_name: eventpilot-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
